<!DOCTYPE html>
<html>
<head>
  <title>AIRBET88 BOT SPORT</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:url("https://i.imgur.com/your-worldcup-bg.jpg") no-repeat center center fixed;
      background-size:cover;
      color:#00ffcc;
    }

    /* HEADER */
    .header{
      text-align:center;
      padding:10px;
      background:rgba(0,0,0,0.6);
    }

    .header img{
      height:80px;
    }

    /* RUNNING TEXT */
    .marquee{
      background:gold;
      color:black;
      padding:5px;
      font-weight:bold;
      white-space:nowrap;
      overflow:hidden;
    }

    .marquee span{
      display:inline-block;
      padding-left:100%;
      animation: run 12s linear infinite;
    }

    @keyframes run{
      0%{transform:translateX(0)}
      100%{transform:translateX(-100%)}
    }

    /* SLIDER */
    .slider{
      width:100%;
      height:300px;
      position:relative;
      overflow:hidden;
    }

    .slides{
      display:flex;
      width:100%;
      transition:0.5s ease;
    }

    .slides img{
      width:100%;
      height:300px;
      object-fit:cover;
    }

    .btn{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      background:rgba(0,0,0,0.6);
      color:#fff;
      border:none;
      font-size:30px;
      padding:10px;
      cursor:pointer;
    }

    .prev{left:10px;}
    .next{right:10px;}

    /* LAYOUT */
    .container{
      display:flex;
    }

    .side{
      width:20%;
      background:rgba(0,0,0,0.6);
      padding:10px;
    }

    .main{
      width:60%;
      padding:10px;
    }

    .box{
      background:rgba(0,0,0,0.6);
      margin-bottom:10px;
      padding:10px;
      border:1px solid #00ffcc;
      text-align:center;
    }

    .box img{
      width:100%;
      height:auto;
      display:block;
      margin-bottom:10px;
    }

    a{
      display:block;
      margin:5px 0;
      padding:10px;
      background:gold;
      color:black;
      text-decoration:none;
      font-weight:bold;
      text-align:center;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="http://plcl.me/images/rWZ3d.gif">
</div>

<!-- RUNNING TEXT -->
<div class="marquee">
  <span>🔥 SELAMAT DATANG DI AIRBET88 - WORLD CUP AI PREDICTION 🔥</span>
</div>

<!-- SLIDER -->
<div class="slider">
  <div class="slides" id="slides">
    <img src="http://plcl.me/images/X2Zgf.jpg">
    <img src="http://plcl.me/images/2HuRq.jpg">
  </div>

  <button class="btn prev" onclick="moveSlide(-1)">❮</button>
  <button class="btn next" onclick="moveSlide(1)">❯</button>
</div>

<!-- CONTENT -->
<div class="container">

  <!-- LEFT SIDEBAR -->
  <div class="side">
    <div class="box">
      <img src="http://plcl.me/images/fb3V3.png">
      <a href="https://access.bit2air.com/airbet88sensasional">SIDEBAR KIRI</a>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="box">
      <h3>JADWAL PERTANDINGAN</h3>
      <p>Afrika Selatan vs Kanada - 2:1</p>
    </div>
  </div>

  <!-- RIGHT SIDEBAR -->
  <div class="side">
    <div class="box">
      <img src="http://plcl.me/images/fb3V3.png">
      <a href="https://access.bit2air.com/livechatairbet88">LIVE CHAT</a>
    </div>
  </div>

</div>

<!-- SLIDER SCRIPT -->
<script>
let index = 0;
const slides = document.getElementById("slides");
const total = slides.children.length;

function moveSlide(dir){
  index += dir;

  if(index < 0) index = total - 1;
  if(index >= total) index = 0;

  slides.style.transform = "translateX(" + (-index * 100) + "%)";
}
</script>

</body>
</html>
