<!DOCTYPE html>
<html>
<head>
  <title>AIRBET88 WORLD CUP AI</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#000;
      min-height:100vh;
      color:#00ffd5;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.75);
      z-index:-1;
    }

    /* HEADER */
    .header{
      text-align:center;
      padding:10px;
      background:rgba(0,0,0,0.8);
    }

    .header img{
      height:90px;
    }

    /* MARQUEE */
    .marquee{
      background:#00ffd5;
      color:#000;
      font-weight:bold;
      overflow:hidden;
      white-space:nowrap;
    }

    .marquee span{
      display:inline-block;
      padding-left:100%;
      animation:run 12s linear infinite;
    }

    @keyframes run{
      0%{transform:translateX(0)}
      100%{transform:translateX(-100%)}
    }

    /* SLIDER */
    .slider-wrapper{
      position:relative;
      width:100%;
      overflow:hidden;
      background:#000;
    }

    .slider-track{
      display:flex;
      transition:transform 0.5s ease;
    }

    .slider-track img{
      width:100%;
      flex-shrink:0;
    }

    .nav{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      background:#00ffd5;
      color:#000;
      border:none;
      font-size:25px;
      padding:8px;
      cursor:pointer;
      z-index:10;
    }

    .prev{left:10px;}
    .next{right:10px;}

    /* FLAGS */
    .flags{
      display:flex;
      justify-content:center;
      gap:10px;
      margin:10px 0;
    }

    .flags img{
      width:60px;
      height:40px;
      border:1px solid #00ffd5;
    }

    /* LAYOUT FIX */
    .container{
      display:grid;
      grid-template-columns: 22% 56% 22%;
      gap:10px;
      padding:10px;
      align-items:start;
    }

    .side{
      background:rgba(0,0,0,0.5);
      padding:10px;
      border:1px solid rgba(0,255,213,0.3);
      min-height:100%;
    }

    .main{
      background:rgba(0,0,0,0.4);
      padding:10px;
      border:1px solid rgba(0,255,213,0.3);
    }

    .item{
      margin-bottom:10px;
      border:1px solid #00ffd5;
      cursor:pointer;
      text-align:center;
    }

    .item a{
      display:block;
      padding:10px;
      background:#00ffd5;
      color:#000;
      font-weight:bold;
      text-decoration:none;
    }

    .box{
      background:rgba(0,0,0,0.7);
      padding:15px;
      border:1px solid #00ffd5;
      margin-bottom:10px;
      text-align:center;
    }

    /* BOT */
    .match-box{
      border:1px solid #00ffd5;
      padding:10px;
      margin:10px 0;
    }

    button{
      background:#00ffd5;
      border:none;
      padding:5px 10px;
      cursor:pointer;
      color:#000;
      font-weight:bold;
    }

  </style>
</head>

<body>

<div class="header">
  <img src="http://plcl.me/images/rWZ3d.gif">
</div>

<div class="marquee">
  <span>🔥 AIRBET88 WORLD CUP AI SYSTEM ACTIVE 🔥</span>
</div>

<!-- SLIDER -->
<div class="slider-wrapper">
  <button class="nav prev" onclick="slide(-1)">❮</button>

  <div class="slider-track" id="track">
    <img src="http://plcl.me/images/X2Zgf.jpg">
    <img src="http://plcl.me/images/2HuRq.jpg">
  </div>

  <button class="nav next" onclick="slide(1)">❯</button>
</div>

<!-- FLAGS -->
<div class="flags">
  <img src="https://flagcdn.com/af.svg">
  <img src="https://flagcdn.com/ca.svg">
</div>

<!-- LAYOUT -->
<div class="container">

  <!-- LEFT -->
  <div class="side">
    <div class="item"><a href="#">TELEGRAM</a></div>
    <div class="item"><a href="#">LOGIN</a></div>
    <div class="item"><a href="#">REGISTER</a></div>
    <div class="item"><a href="#">PROMO</a></div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="box">
      <h2>JADWAL</h2>
      <p>Auto dari Excel</p>
    </div>

    <div class="box">
      <h2>🤖 BOT AI MATCH</h2>
      <div id="matchList">Loading...</div>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="side">
    <div class="item"><a href="#">LIVE CHAT</a></div>
    <div class="item"><a href="#">DATA MATCH</a></div>
    <div class="item"><a href="#">STATISTIK</a></div>
    <div class="item"><a href="#">ODDS AI</a></div>
  </div>

</div>

<script>

/* SLIDER */
let index = 0;

function slide(dir){
  const track = document.getElementById("track");
  const total = track.children.length;

  index += dir;

  if(index < 0) index = total - 1;
  if(index >= total) index = 0;

  track.style.transform = `translateX(-${index * 100}%)`;
}


/* LOAD EXCEL (GOOGLE SHEETS CSV) */
async function loadMatches(){

  const url = "https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/export?format=csv";

  const res = await fetch(url);
  const text = await res.text();

  const rows = text.split("\n").slice(1);

  let html = "";

  rows.forEach((r,i)=>{
    const [home,away,oh,oa] = r.split(",");

    if(!home || !away) return;

    html += `
      <div class="match-box">
        ⚽ <b>${home} vs ${away}</b><br><br>

        <button onclick="predict(${oh},${oa},'${home}','${away}')">
          🤖 ANALISA BOT
        </button>

        <div id="res${i}"></div>
      </div>
    `;
  });

  document.getElementById("matchList").innerHTML = html;
}


/* BOT PREDICTION */
function predict(oh,oa,home,away){

  let result = "";

  if(parseFloat(oh) < parseFloat(oa)){
    result = `🔥 ${home} lebih unggul`;
  } else if(parseFloat(oa) < parseFloat(oh)){
    result = `🔥 ${away} lebih unggul`;
  } else {
    result = `⚖️ Seimbang`;
  }

  alert(result);
}

loadMatches();

</script>

</body>
</html>
