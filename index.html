<!DOCTYPE html>
<html>
<head>
  <title>AIRBET88 WORLD CUP AI</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#000;
      color:#00ffd5;
      min-height:100vh;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.75);
      z-index:-1;
    }

    /* HEADER */
    .header{
      text-align:center;
      padding:10px;
      background:rgba(0,0,0,0.8);
    }

    .header img{
      height:90px;
    }

    /* MARQUEE */
    .marquee{
      background:#00ffd5;
      color:#000;
      font-weight:bold;
      white-space:nowrap;
      overflow:hidden;
    }

    .marquee span{
      display:inline-block;
      padding-left:100%;
      animation:run 12s linear infinite;
    }

    @keyframes run{
      0%{transform:translateX(0)}
      100%{transform:translateX(-100%)}
    }

    /* SLIDER */
    .slider-wrapper{
      position:relative;
      width:100%;
      overflow:hidden;
      background:#000;
    }

    .slider-track{
      display:flex;
      transition:transform 0.5s ease;
    }

    .slider-track img{
      width:100%;
      flex-shrink:0;
    }

    .nav{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      background:#00ffd5;
      color:#000;
      border:none;
      font-size:24px;
      padding:8px;
      cursor:pointer;
    }

    .prev{left:10px;}
    .next{right:10px;}

    /* FLAGS */
    .flags{
      display:flex;
      justify-content:center;
      gap:10px;
      margin:10px 0;
    }

    .flags img{
      width:60px;
      height:40px;
      border:1px solid #00ffd5;
    }

    /* LAYOUT FIX TOTAL */
    .container{
      display:grid;
      grid-template-columns: 22% minmax(0,1fr) 22%;
      gap:10px;
      padding:10px;
      width:100%;
    }

    .side{
      background:rgba(0,0,0,0.5);
      padding:10px;
      min-width:0;
    }

    .main{
      background:rgba(0,0,0,0.4);
      padding:10px;
    }

    .item{
      margin-bottom:10px;
      border:1px solid #00ffd5;
      text-align:center;
      cursor:pointer;
    }

    .item a{
      display:block;
      padding:10px;
      background:#00ffd5;
      color:#000;
      font-weight:bold;
      text-decoration:none;
    }

    .box{
      border:1px solid #00ffd5;
      padding:10px;
      margin-bottom:10px;
      text-align:center;
    }

    /* BOT MATCH */
    .match-box{
      border:1px solid #00ffd5;
      padding:10px;
      margin:10px 0;
    }

    .btn-ai{
      background:#00ffd5;
      border:none;
      padding:5px 10px;
      cursor:pointer;
      color:#000;
      font-weight:bold;
      margin-top:5px;
    }

    .result{
      margin-top:5px;
    }

  </style>
</head>

<body>

<div class="header">
  <img src="http://plcl.me/images/rWZ3d.gif">
</div>

<div class="marquee">
  <span>🔥 AIRBET88 WORLD CUP AI SYSTEM ACTIVE 🔥</span>
</div>

<!-- SLIDER -->
<div class="slider-wrapper">
  <button class="nav prev" onclick="slide(-1)">❮</button>

  <div class="slider-track" id="track">
    <img src="http://plcl.me/images/X2Zgf.jpg">
    <img src="http://plcl.me/images/2HuRq.jpg">
  </div>

  <button class="nav next" onclick="slide(1)">❯</button>
</div>

<!-- FLAGS -->
<div class="flags">
  <img src="https://flagcdn.com/af.svg">
  <img src="https://flagcdn.com/ca.svg">
</div>

<!-- LAYOUT -->
<div class="container">

  <!-- LEFT -->
  <div class="side">
    <div class="item"><a href="#">TELEGRAM</a></div>
    <div class="item"><a href="#">LOGIN</a></div>
    <div class="item"><a href="#">REGISTER</a></div>
    <div class="item"><a href="#">PROMO</a></div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="box">
      <h2>JADWAL</h2>
      <p>DATA LIVE MATCH</p>
    </div>

    <div class="box">
      <h2>🤖 BOT AI MATCH</h2>
      <div id="matchList">Loading...</div>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="side">
    <div class="item"><a href="#">LIVE CHAT</a></div>
    <div class="item"><a href="#">DATA MATCH</a></div>
    <div class="item"><a href="#">STATISTIK</a></div>
    <div class="item"><a href="#">ODDS AI</a></div>
  </div>

</div>

<script>

/* SLIDER */
let index = 0;
function slide(dir){
  const track = document.getElementById("track");
  const total = track.children.length;

  index += dir;
  if(index < 0) index = total - 1;
  if(index >= total) index = 0;

  track.style.transform = `translateX(-${index * 100}%)`;
}


/* LOAD MATCH (EXCEL / SHEETS CSV) */
async function loadMatches(){

  const url = "https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/export?format=csv";

  try{
    const res = await fetch(url);
    const text = await res.text();

    const rows = text.split("\n").slice(1);

    let html = "";

    rows.forEach((r,i)=>{
      const [home,away,oh,oa] = r.split(",");
      if(!home || !away) return;

      html += `
        <div class="match-box">
          ⚽ <b>${home} vs ${away}</b><br>

          <button class="btn-ai"
            data-home="${home}"
            data-away="${away}"
            data-oh="${oh}"
            data-oa="${oa}">
            🤖 ANALISA BOT
          </button>

          <div class="result"></div>
        </div>
      `;
    });

    document.getElementById("matchList").innerHTML = html;

  } catch(e){
    document.getElementById("matchList").innerHTML = "Gagal load data";
  }
}


/* BUTTON ENGINE */
document.addEventListener("click", function(e){

  if(e.target.classList.contains("btn-ai")){

    const btn = e.target;

    const home = btn.dataset.home;
    const away = btn.dataset.away;
    const oh = parseFloat(btn.dataset.oh);
    const oa = parseFloat(btn.dataset.oa);

    let result = "";

    if(oh < oa){
      result = `🔥 ${home} lebih unggul`;
    } else if(oa < oh){
      result = `🔥 ${away} lebih unggul`;
    } else {
      result = `⚖️ Seimbang`;
    }

    btn.nextElementSibling.innerHTML = result;
  }
});

loadMatches();

</script>

</body>
</html>
